name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config/**'
      - 'infra/**'
      - '.github/workflows/deploy-function.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: discdev-func-3xr5ve
  AZURE_STORAGE_ACCOUNT: discdevstor3xr5ve
  AZURE_RESOURCE_GROUP: discovery-dev
  DOTNET_VERSION: '9.0.x'
  FUNCTION_APP_PATH: './src/DiscoveryAgent'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.FUNCTION_APP_PATH }}

    - name: Build project
      run: dotnet build ${{ env.FUNCTION_APP_PATH }} --configuration Release --no-restore

    - name: Publish project
      run: dotnet publish ${{ env.FUNCTION_APP_PATH }} --configuration Release --no-build --output ./publish

    - name: Create deployment package
      run: |
        cd ./publish
        zip -r ../package.zip .
        cd ..

    - name: Azure Login via OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Upload package to blob storage
      run: |
        az storage blob upload \
          --account-name ${{ env.AZURE_STORAGE_ACCOUNT }} \
          --container-name deployments \
          --name package.zip \
          --file ./package.zip \
          --overwrite \
          --auth-mode login

    - name: Restart Function App
      run: |
        az functionapp restart \
          --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

    - name: Wait for Function App to be ready
      run: sleep 30

    - name: Verify deployment
      run: |
        echo "Checking Function App health..."
        HEALTH_URL="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health"

        for i in {1..5}; do
          if curl -f -s "$HEALTH_URL" > /dev/null; then
            echo "Function App is healthy!"
            exit 0
          fi
          echo "Attempt $i failed, waiting..."
          sleep 10
        done

        echo "Warning: Health check did not succeed within timeout"
        exit 1
