<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Discovery Agent</h1>
            <p>AI-powered knowledge discovery and conversation</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message system">
                <div class="message-content">
                    <strong>Welcome to Discovery Agent</strong><br>
                    Start a conversation to discover, understand, and document knowledge.<br>
                    Your session ID: <strong id="userIdDisplay"></strong>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="loading" id="loading">Agent is thinking...</div>
            <div class="upload-status" id="uploadStatus"></div>
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.xlsx,.txt,.csv,.png,.jpg,.jpeg">
                <button id="attachButton" title="Attach file">📎</button>
                <button id="sendButton">Send</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
